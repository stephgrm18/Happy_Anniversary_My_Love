<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:    #ff4d6d;
    --blush:   #ffb3c6;
    --deep:    #590d22;
    --cream:   #fff0f3;
    --gold:    #f9c74f;
    --white:   #ffffff;
  }

  body {
    background: radial-gradient(ellipse at 60% 40%, #2d0a16 0%, #0d0006 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    position: relative;
  }

  /* ── Ambient floating hearts ── */
  .ambient-heart {
    position: fixed;
    font-size: 1.2rem;
    opacity: 0;
    pointer-events: none;
    animation: floatUp 6s ease-in infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.1; }
    100% { transform: translateY(-100vh) scale(0.5) rotate(30deg); opacity: 0; }
  }

  /* ── Scene wrapper ── */
  #scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    transition: opacity 0.6s ease;
    z-index: 10;
  }

  /* ── Speech bubble ── */
  #bubble {
    background: var(--white);
    border: 2.5px solid var(--rose);
    border-radius: 22px;
    padding: 14px 24px;
    font-family: 'Lato', sans-serif;
    font-size: 1.1rem;
    color: var(--deep);
    font-weight: 400;
    letter-spacing: 0.02em;
    position: relative;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 4px 32px rgba(255,77,109,0.18);
    animation: bubbleBob 3s ease-in-out infinite;
  }

  #bubble::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    border: 9px solid transparent;
    border-top-color: var(--rose);
    border-bottom: 0;
  }

  #bubble::before {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: var(--white);
    border-bottom: 0;
    z-index: 1;
  }

  @keyframes bubbleBob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  /* ── Delivery guy ── */
  #delivery-guy {
    width: 220px;
    height: 220px;
    object-fit: contain;
    filter: drop-shadow(0 8px 32px rgba(255,77,109,0.25));
    position: relative;
    z-index: 2;
    margin-top: 12px;
    /* Fallback emoji if image not found */
    font-size: 160px;
    text-align: center;
    line-height: 220px;
    user-select: none;
  }

  /* ── Gift box ── */
  #gift-wrap {
    position: relative;
    cursor: pointer;
    margin-top: -10px;
    z-index: 3;
    animation: subtleShake 1.8s ease-in-out infinite;
    transform-origin: center bottom;
  }

  #gift-wrap:hover {
    animation: intenseShake 0.25s ease-in-out infinite;
  }

  #gift-box {
    width: 120px;
    height: 110px;
    background: linear-gradient(135deg, var(--rose) 0%, #c9184a 100%);
    border-radius: 10px 10px 6px 6px;
    position: relative;
    box-shadow:
      0 8px 32px rgba(201,24,74,0.5),
      inset 0 2px 0 rgba(255,255,255,0.2);
    overflow: visible;
  }

  /* Bulge / overstuffed effect */
  #gift-box::before {
    content: '';
    position: absolute;
    inset: -4px;
    background: linear-gradient(135deg, #ff6b8a 0%, #c9184a 100%);
    border-radius: 13px 13px 9px 9px;
    z-index: -1;
    animation: bulge 1.8s ease-in-out infinite;
  }

  @keyframes bulge {
    0%, 100% { transform: scale(1,1); }
    50%       { transform: scale(1.04, 1.06); }
  }

  /* Ribbon vertical */
  #gift-box::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    background: var(--gold);
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(249,199,79,0.5);
  }

  /* Ribbon horizontal */
  .ribbon-h {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 18px;
    transform: translateY(-50%);
    background: var(--gold);
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(249,199,79,0.5);
    z-index: 2;
  }

  /* Bow */
  .bow {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 28px;
    z-index: 3;
  }

  .bow-loop {
    position: absolute;
    width: 24px;
    height: 20px;
    background: var(--gold);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    top: 4px;
    box-shadow: 0 0 8px rgba(249,199,79,0.4);
  }

  .bow-loop.left  { left: 0;  transform: rotate(-30deg); }
  .bow-loop.right { right: 0; transform: rotate(30deg);  }

  .bow-center {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #e9b12b;
    border-radius: 50%;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    box-shadow: 0 0 10px rgba(249,199,79,0.6);
  }

  /* Stars / sparkles around box */
  .sparkle {
    position: absolute;
    color: var(--gold);
    font-size: 1rem;
    animation: sparkleAnim 1.4s ease-in-out infinite;
    pointer-events: none;
  }

  .sparkle:nth-child(1) { top: -10px; left: -18px; animation-delay: 0s; }
  .sparkle:nth-child(2) { top: -14px; right: -16px; animation-delay: 0.3s; }
  .sparkle:nth-child(3) { bottom: 10px; left: -22px; animation-delay: 0.6s; }
  .sparkle:nth-child(4) { bottom: 6px; right: -20px; animation-delay: 0.9s; }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0.2; transform: scale(0.7) rotate(0deg); }
    50%       { opacity: 1;   transform: scale(1.2) rotate(20deg); }
  }

  /* Hint text */
  #hint {
    margin-top: 16px;
    font-size: 0.78rem;
    color: var(--blush);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1; }
  }

  /* ── Shake keyframes ── */
  @keyframes subtleShake {
    0%, 100% { transform: rotate(0deg) scale(1); }
    20%       { transform: rotate(-2deg) scale(1.01); }
    40%       { transform: rotate(2deg) scale(1.02); }
    60%       { transform: rotate(-1.5deg) scale(1.01); }
    80%       { transform: rotate(1.5deg) scale(1.02); }
  }

  @keyframes intenseShake {
    0%   { transform: rotate(-5deg) scale(1.05); }
    25%  { transform: rotate(5deg)  scale(1.07); }
    50%  { transform: rotate(-4deg) scale(1.05); }
    75%  { transform: rotate(4deg)  scale(1.07); }
    100% { transform: rotate(-5deg) scale(1.05); }
  }

  /* ── Particles ── */
  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    z-index: 100;
    animation: particleFly var(--dur) ease-out forwards;
  }

  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
  }

  /* ── Waterfall columns ── */
  #waterfall {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: flex;
    gap: 10px;
    padding: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  #waterfall.active { opacity: 1; }

  .wf-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: cascadeDown var(--col-dur) linear infinite;
    will-change: transform;
  }

  @keyframes cascadeDown {
    0%   { transform: translateY(0); }
    100% { transform: translateY(var(--scroll-dist)); }
  }

  .wf-card {
    width: 100%;
    flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.55), 0 0 0 2px rgba(255,255,255,0.1);
    aspect-ratio: var(--ar);
  }

  .wf-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Burst photo (initial explosion, then fades) ── */
  .photo-burst {
    position: fixed;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,255,255,0.15);
    opacity: 0;
    z-index: 60;
    pointer-events: none;
    animation: burstOut var(--burst-dur) cubic-bezier(0.22,1,0.36,1) var(--delay) forwards;
  }

  .photo-burst img { width: 100%; height: 100%; object-fit: cover; display: block; }

  @keyframes burstOut {
    0%   { opacity: 0;   transform: translate(var(--sx),var(--sy)) scale(0.1) rotate(var(--sr)); }
    55%  { opacity: 1;   transform: translate(var(--mx),var(--my)) scale(1.15) rotate(var(--mr)); }
    80%  { opacity: 1;   transform: translate(var(--fx),var(--fy)) scale(1) rotate(var(--fr)); }
    100% { opacity: 0;   transform: translate(var(--fx),var(--fy)) scale(0.9) rotate(var(--fr)); }
  }

  /* ── Final message ── */
  #final-msg {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    text-align: center;
    padding: 20px;
  }

  #final-msg.visible {
    animation: msgFadeIn 1.8s ease forwards;
  }

  @keyframes msgFadeIn {
    0%   { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }

  #final-msg h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 7vw, 5rem);
    color: var(--white);
    text-shadow:
      0 0 60px rgba(255,77,109,0.9),
      0 0 20px rgba(255,77,109,0.7),
      0 4px 20px rgba(0,0,0,0.8);
    line-height: 1.15;
    letter-spacing: -0.01em;
  }

  #final-msg h1 em {
    font-style: italic;
    color: var(--blush);
  }

  #final-msg p {
    margin-top: 16px;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: rgba(255,179,198,0.9);
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }

  .heart-big {
    font-size: clamp(2.5rem, 6vw, 4rem);
    animation: heartbeat 0.9s ease-in-out infinite;
    display: inline-block;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    30%       { transform: scale(1.18); }
    60%       { transform: scale(0.95); }
  }

  /* ── Overlay dim behind final message ── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    z-index: 150;
    pointer-events: none;
    transition: background 1.4s ease;
  }

  #overlay.dimmed { background: rgba(0,0,0,0.45); }

  /* ── Audio player ── */
  #audio-player {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 1s ease 0.6s, transform 1s ease 0.6s;
    pointer-events: none;
  }

  #audio-player.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  #audio-label {
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--blush);
    opacity: 0.85;
  }

  #play-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2.5px solid var(--rose);
    background: rgba(255,77,109,0.12);
    backdrop-filter: blur(8px);
    color: var(--white);
    font-size: 1.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(255,77,109,0.3);
    line-height: 1;
    padding: 0;
  }

  #play-btn:hover {
    background: rgba(255,77,109,0.28);
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(255,77,109,0.55);
  }

  #play-btn:active { transform: scale(0.96); }

  /* Progress bar */
  #progress-wrap {
    width: 200px;
    height: 4px;
    background: rgba(255,179,198,0.2);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--rose), var(--blush));
    border-radius: 2px;
    transition: width 0.25s linear;
  }

  #time-label {
    font-size: 0.72rem;
    color: rgba(255,179,198,0.6);
    letter-spacing: 0.06em;
    display: none;
  }

  /* ── Responsive tweaks ── */
  @media (max-width: 500px) {
    #gift-box { width: 100px; height: 90px; }
    #delivery-guy { width: 180px; height: 180px; font-size: 130px; line-height: 180px; }
    #bubble { font-size: 0.95rem; padding: 11px 18px; }
  }
</style>
</head>
<body>

<!-- Ambient hearts (injected by JS) -->

<!-- ── MAIN SCENE ── -->
<div id="scene">

  <!-- Speech bubble -->
  <div id="bubble">Special delivery for a very special girl! 🎁</div>

  <!-- Delivery guy image (swap DELIVERY_GUY_IMG at top of script) -->
  <div id="delivery-guy">🧑‍💼</div>

  <!-- Gift box -->
  <div id="gift-wrap">
    <span class="sparkle">✦</span>
    <span class="sparkle">✦</span>
    <span class="sparkle">✦</span>
    <span class="sparkle">✦</span>
    <div id="gift-box">
      <div class="ribbon-h"></div>
      <div class="bow">
        <div class="bow-loop left"></div>
        <div class="bow-loop right"></div>
        <div class="bow-center"></div>
      </div>
    </div>
  </div>

  <div id="hint">✨ tap the gift ✨</div>
</div>

<!-- Waterfall photo background -->
<div id="waterfall"></div>

<!-- Overlay for final dimming -->
<div id="overlay"></div>

<!-- Final message -->
<div id="final-msg">
  <div class="heart-big">❤️</div>
  <h1>Happy Anniversary,<br><em>I love you</em></h1>
  <p>Always &amp; forever · con todo mi corazón</p>

  <!-- Audio player (shown after reveal) -->
  <div id="audio-player">
    <div id="audio-label">🎙️ a message for you</div>
    <button id="play-btn" aria-label="Play voice message">▶️</button>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="time-label">0:00 / 0:00</div>
  </div>
</div>

<script>
  /* ── Config (swap these!) ── */
  // PHOTOS and DELIVERY_GUY_IMG are defined in the <script> in <head>

  /* ── Swap delivery guy image ── */
  const guy = document.getElementById('delivery-guy');
  const img = new Image();
  img.src = DELIVERY_GUY_IMG;
  img.onload = () => {
    guy.textContent = '';
    guy.style.cssText += 'font-size:0;line-height:0;';
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;';
    guy.appendChild(img);
  };

  /* ── Ambient hearts ── */
  const emojis = ['❤️','💕','💖','💗','🌸','✨'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'ambient-heart';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      bottom: -40px;
      animation-delay: ${Math.random() * 6}s;
      animation-duration: ${5 + Math.random() * 5}s;
      font-size: ${0.7 + Math.random() * 0.8}rem;
    `;
    document.body.appendChild(el);
  }



  /* ── Explosion ── */
  const gift = document.getElementById('gift-wrap');
  const scene = document.getElementById('scene');
  const overlay = document.getElementById('overlay');
  const finalMsg = document.getElementById('final-msg');
  let exploded = false;

  gift.addEventListener('click', explode);
  gift.addEventListener('touchend', e => { e.preventDefault(); explode(); });

  function explode() {
    if (exploded) return;
    exploded = true;

    const rect = gift.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    /* 1. Burst particles */
    spawnParticles(cx, cy, 80);

    /* 2. Fade delivery guy */
    scene.style.transition = 'opacity 0.7s ease';
    scene.style.opacity = '0';
    setTimeout(() => { scene.style.display = 'none'; }, 700);

    /* 3. Photos burst out */
    setTimeout(() => spawnPhotos(cx, cy), 200);

    /* 4. Waterfall starts as burst fades */
    setTimeout(() => buildWaterfall(), 1400);

    /* 5. Dim overlay + final message */
    setTimeout(() => {
      overlay.classList.add('dimmed');
      finalMsg.classList.add('visible');
      finalMsg.style.pointerEvents = 'auto';
      // Show audio player after message fades in
      if (AUDIO_MSG) setTimeout(showAudioPlayer, 1600);
    }, 2400);
  }

  /* ── Audio player ── */
  function showAudioPlayer() {
    const player   = document.getElementById('audio-player');
    const playBtn  = document.getElementById('play-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const timeLabel    = document.getElementById('time-label');

    const audio = new Audio(AUDIO_MSG);
    audio.preload = 'metadata';
    let playing = false;

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    audio.addEventListener('loadedmetadata', () => {
      timeLabel.textContent = `0:00 / ${fmt(audio.duration)}`;
      progressWrap.style.display = 'block';
      timeLabel.style.display = 'block';
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = pct + '%';
      timeLabel.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    });

    audio.addEventListener('ended', () => {
      playing = false;
      playBtn.textContent = '▶️';
      playBtn.setAttribute('aria-label', 'Play voice message');
      progressBar.style.width = '0%';
      audio.currentTime = 0;
    });

    playBtn.addEventListener('click', () => {
      if (playing) {
        audio.pause();
        playBtn.textContent = '▶️';
        playBtn.setAttribute('aria-label', 'Play voice message');
      } else {
        audio.play().catch(() => {});
        playBtn.textContent = '⏸️';
        playBtn.setAttribute('aria-label', 'Pause voice message');
      }
      playing = !playing;
    });

    player.classList.add('visible');
  }

  /* ── Spawn particles ── */
  function spawnParticles(cx, cy, count) {
    const colors = ['#ff4d6d','#ffb3c6','#f9c74f','#ffffff','#c9184a','#ff85a1'];
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 6 + Math.random() * 14;
      const angle = Math.random() * Math.PI * 2;
      const dist = 80 + Math.random() * 280;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - Math.random() * 200;
      const dur = (0.6 + Math.random() * 0.9).toFixed(2) + 's';
      const rot = (Math.random() * 720 - 360).toFixed(0) + 'deg';
      p.style.cssText = `
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${cx - size/2}px; top:${cy - size/2}px;
        --tx:${tx}px; --ty:${ty}px; --dur:${dur}; --rot:${rot};
        border-radius:${Math.random() > 0.4 ? '50%' : '3px'};
        opacity:1;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1600);
    }
  }

  /* ── Spawn burst photos (explosion effect, then fade out) ── */
  function spawnPhotos(cx, cy) {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    PHOTOS.forEach((src, i) => {
      const card = document.createElement('div');
      card.className = 'photo-burst';

      const w = Math.round(150 + Math.random() * 100);
      const h = Math.round(110 + Math.random() * 100);

      const fx = 60 + Math.random() * (vw - w - 120);
      const fy = 60 + Math.random() * (vh - h - 120);
      const sx = cx - fx - w / 2;
      const sy = cy - fy - h / 2;

      const angle = Math.random() * Math.PI * 2;
      const over  = 60 + Math.random() * 100;
      const mx = Math.cos(angle) * over;
      const my = Math.sin(angle) * over;

      const sr = (Math.random() * 40 - 20).toFixed(1) + 'deg';
      const mr = (Math.random() * 20 - 10).toFixed(1) + 'deg';
      const fr = (Math.random() * 10 - 5).toFixed(1) + 'deg';

      const delay   = (0.04 + i * 0.07).toFixed(2) + 's';
      const burstDur = (1.4 + Math.random() * 0.4).toFixed(2) + 's';

      card.style.cssText = `
        width:${w}px; height:${h}px;
        left:${fx}px; top:${fy}px;
        --sx:${sx}px; --sy:${sy}px;
        --mx:${mx}px; --my:${my}px;
        --fx:0px; --fy:0px;
        --sr:${sr}; --mr:${mr}; --fr:${fr};
        --delay:${delay}; --burst-dur:${burstDur};
        animation-delay:${delay};
      `;

      const image = document.createElement('img');
      image.src = src;
      image.alt = 'Memory ' + (i + 1);
      card.appendChild(image);
      document.body.appendChild(card);

      // Remove burst card after animation ends
      const totalMs = (parseFloat(delay) + parseFloat(burstDur)) * 1000;
      setTimeout(() => card.remove(), totalMs + 100);
    });
  }

  /* ── Build waterfall ── */
  function buildWaterfall() {
    const wf = document.getElementById('waterfall');
    const vw = window.innerWidth;

    const colCount = vw < 500 ? 2 : vw < 800 ? 3 : 4;
    const colWidth  = (vw - (colCount + 1) * 10) / colCount;
    const aspects   = [4/3, 3/4, 1, 16/9, 2/3];

    for (let c = 0; c < colCount; c++) {
      const col = document.createElement('div');
      col.className = 'wf-column';

      const speed = 20 + c * 5 + Math.random() * 5;

      // Shuffle a copy of PHOTOS per column for variety
      const photoSet = [...PHOTOS];
      for (let j = photoSet.length - 1; j > 0; j--) {
        const k = Math.floor(Math.random() * (j + 1));
        [photoSet[j], photoSet[k]] = [photoSet[k], photoSet[j]];
      }

      // Build one "tile" of cards and measure its height
      let tileH = 0;
      const tileCards = photoSet.map((src, idx) => {
        const ar = aspects[idx % aspects.length];
        const cardH = Math.round(colWidth / ar);
        tileH += cardH + 10;

        const card = document.createElement('div');
        card.className = 'wf-card';
        card.style.setProperty('--ar', ar);
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.loading = 'lazy';
        card.appendChild(img);
        return card;
      });

      // Repeat tiles until we have at least 3× the screen height,
      // then duplicate the whole set once more for the seamless loop
      const vh = window.innerHeight;
      let repeats = Math.ceil((vh * 3) / tileH);
      if (repeats < 2) repeats = 2;

      const allCards = [];
      for (let r = 0; r < repeats; r++) {
        tileCards.forEach(card => allCards.push(card.cloneNode(true)));
      }

      const halfH = tileH * repeats; // scroll exactly this distance then snap back

      // Odd columns start offset so columns are visually staggered
      const startDelay = c % 2 === 0 ? '0s' : `-${(speed / 2).toFixed(1)}s`;

      col.style.cssText = `
        --col-dur: ${speed}s;
        --scroll-dist: -${halfH}px;
        animation-delay: ${startDelay};
      `;

      // Append cards twice (first half scrolls into view, second half queues up)
      allCards.forEach(card => col.appendChild(card));
      allCards.forEach(card => col.appendChild(card.cloneNode(true)));

      wf.appendChild(col);
    }
    wf.classList.add('active');
  }
</script>
